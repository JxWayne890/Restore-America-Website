    <script type="application/ld+json">
    {

          "@type": "Question",
          "name": "Do you really offer free roof inspections?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — 100% complimentary, no strings attached. Our inspectors come to your property, document all damage with photos and detailed reports, and walk you through everything we find. There is no obligation to hire us, and no cost to you for the inspection."
          }
        },
        {
          "@type": "Question",
          "name": "How do insurance claims work for storm damage?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After a storm, your insurance company sends an adjuster to assess the damage. Unfortunately, adjusters often miss items or undervalue repairs. Our team documents every point of damage before the adjuster arrives, attends the adjuster meeting with you, and fights for the full replacement your home deserves. In most cases, you only pay your deductible."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between mitigation, packout, and build back?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mitigation is the emergency phase — stopping further damage (tarping, water extraction, board-up). Packout involves carefully removing and storing your belongings so restoration work can proceed safely. Build back is the full reconstruction phase, restoring your home to pre-loss condition. Restore America handles all three phases under one roof."
          }
        },
        {
          "@type": "Question",
          "name": "Do you handle fire and flood damage, not just roofing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. We are a full-service restoration contractor. We handle fire damage (including smoke and soot mitigation), flood and water damage (including mold prevention), hail damage, wind damage, and complete structural reconstruction. We also manage the entire insurance claim process for all damage types."
          }
        },
        {
          "@type": "Question",
          "name": "What if my insurance claim was denied or lowballed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Don't accept a denial or lowball offer without a fight. We provide video evidence, detailed damage reports, and expert documentation to appeal denied claims and supplement underpaid ones. Many of our clients have had initial offers of a few thousand dollars increased to full replacements worth $20,000–$40,000 after our advocacy."
          }
        },
        {
          "@type": "Question",
          "name": "How soon can you start after the inspection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In most cases, we can begin emergency mitigation work within 24 hours of your inspection. For full replacement projects, we typically begin within a few days of your insurance claim being approved. We work efficiently to minimize the time your home is exposed to further damage."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work on commercial properties?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We serve both residential and commercial clients — from single-family homes to office buildings, warehouses, retail centers, and multi-family units. Our commercial team has experience with flat roofing systems, TPO, EPDM, and metal roofing."
          }
        },
        {
          "@type": "Question",
          "name": "What areas do you serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We currently serve Georgia (including Atlanta metro, Walton County, and surrounding areas), Florida, and Missouri. If you're unsure whether we serve your area, call us at (770) 373-5663 and we'll let you know immediately."
          }
        },

          "@type": "Question",
